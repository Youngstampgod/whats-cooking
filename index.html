<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What's Cooking — Dinner Decision Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --fire: #ff6b35;
      --fire-dim: #e8410a;
      --deliver: #38bdf8;
      --deliver-dim: #0284c7;
      --goout: #34d399;
      --goout-dim: #059669;
      --bg: #080300;
      --card-bg: #0f0500;
      --card-border: #2a1000;
      --reel-bg: #0d0500;
      --text-warm: #d4a080;
      --text-muted: #7a4a30;
      --text-dimmer: #3a1800;
      --accent: #ff6b35;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: #fff;
      font-family: 'Crimson Pro', Georgia, serif;
      min-height: 100vh;
      overflow-x: hidden;
      transition: --accent 0.4s;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--reel-bg); }
    ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 2px; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .eyebrow {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(10px, 2vw, 12px);
      letter-spacing: 7px;
      color: var(--accent);
      opacity: 0.7;
      margin-bottom: 10px;
      text-align: center;
      transition: color 0.4s;
    }

    .headline {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(48px, 12vw, 88px);
      line-height: 0.88;
      letter-spacing: 3px;
      text-align: center;
      animation: flicker 5s ease-in-out infinite;
    }

    .headline span {
      color: var(--accent);
      transition: color 0.4s;
    }

    .tagline {
      margin-top: 12px;
      color: var(--text-muted);
      font-size: 14px;
      font-style: italic;
      text-align: center;
    }

    /* ── MODE TABS ── */
    .mode-tabs {
      display: flex;
      gap: 6px;
      margin-top: 30px;
      background: rgba(255,255,255,0.03);
      border: 1px solid #1a0800;
      border-radius: 12px;
      padding: 5px;
    }

    .mode-tab {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(13px, 3vw, 16px);
      letter-spacing: 3px;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .mode-tab.active-cook   { background: rgba(255,107,53,0.15); color: var(--fire);    border: 1px solid rgba(255,107,53,0.3); }
    .mode-tab.active-deliver { background: rgba(56,189,248,0.12); color: var(--deliver); border: 1px solid rgba(56,189,248,0.3); }
    .mode-tab.active-goout  { background: rgba(52,211,153,0.12); color: var(--goout);   border: 1px solid rgba(52,211,153,0.3); }

    .mode-tab:hover:not([class*="active"]) { color: #a0784a; }

    /* ── MAIN CARD ── */
    .card {
      margin-top: 24px;
      width: 100%;
      max-width: 620px;
      background: linear-gradient(160deg, #150900 0%, #0a0300 100%);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 28px 24px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 60px 100px rgba(0,0,0,0.85);
      transition: border-color 0.4s;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(255,107,53,0.04) 0%, transparent 70%);
      pointer-events: none;
      transition: background 0.4s;
    }

    /* ── LOCATION BAR ── */
    .location-bar {
      display: none;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid #1a0800;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 0.3s;
    }

    .location-bar:hover { border-color: #3a2000; }
    .location-bar.visible { display: flex; }
    .location-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; transition: background 0.4s; }
    .location-text { flex: 1; font-style: italic; }
    .location-refresh { font-size: 14px; opacity: 0.5; }

    /* ── REELS ── */
    .reels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }

    .reel-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
    }

    .reel-label {
      font-family: 'Bebas Neue', cursive;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--accent);
      opacity: 0.8;
      text-transform: uppercase;
      transition: color 0.4s;
    }

    .reel {
      width: 100%;
      height: 86px;
      background: linear-gradient(135deg, #1a0a00 0%, var(--reel-bg) 100%);
      border: 2px solid #3a1a00;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      transition: border-color 0.3s, box-shadow 0.3s;
      box-shadow: inset 0 0 24px rgba(0,0,0,0.6);
    }

    .reel.spinning {
      border-color: var(--accent);
      box-shadow: 0 0 22px rgba(255,107,53,0.3), inset 0 0 18px rgba(255,107,53,0.06);
    }

    .reel-fade-top, .reel-fade-bottom {
      position: absolute; left: 0; right: 0; height: 26px;
      z-index: 2; pointer-events: none;
    }
    .reel-fade-top    { top: 0;    background: linear-gradient(to bottom, var(--reel-bg), transparent); }
    .reel-fade-bottom { bottom: 0; background: linear-gradient(to top,    var(--reel-bg), transparent); }

    .reel-text {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(14px, 3vw, 19px);
      color: #fff;
      text-align: center;
      padding: 0 10px;
      line-height: 1.1;
      letter-spacing: 1px;
      transition: color 0.2s, text-shadow 0.2s;
      position: relative; z-index: 1;
    }

    .reel.spinning .reel-text {
      color: #ffa070;
      text-shadow: 0 0 18px rgba(255,107,53,0.9);
    }

    /* ── SPIN BUTTON ── */
    .spin-btn-wrap { position: relative; }

    .pulse-ring {
      display: none;
      position: absolute; inset: 0;
      border-radius: 12px;
      border: 2px solid rgba(255,107,53,0.5);
      animation: pulse-ring 1s ease-out infinite;
    }
    .pulse-ring.active { display: block; }

    .spin-btn {
      width: 100%; height: 66px;
      background: linear-gradient(135deg, var(--fire) 0%, var(--fire-dim) 100%);
      border: none; border-radius: 12px;
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(17px, 4vw, 24px);
      letter-spacing: 5px; color: #fff;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 10px 40px rgba(255,107,53,0.4), 0 2px 0 rgba(255,255,255,0.08) inset;
      position: relative; overflow: hidden;
    }

    .spin-btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      transition: left 0.5s;
    }
    .spin-btn:hover::after { left: 150%; }
    .spin-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 16px 48px rgba(255,107,53,0.5); }
    .spin-btn:active:not(:disabled) { transform: translateY(0); }
    .spin-btn:disabled { background: linear-gradient(135deg, #3a1800, #200e00); box-shadow: none; cursor: not-allowed; }

    /* mode-colored buttons */
    .spin-btn.mode-deliver { background: linear-gradient(135deg, var(--deliver) 0%, var(--deliver-dim) 100%); box-shadow: 0 10px 40px rgba(56,189,248,0.3), 0 2px 0 rgba(255,255,255,0.08) inset; }
    .spin-btn.mode-deliver:hover:not(:disabled) { box-shadow: 0 16px 48px rgba(56,189,248,0.5); }
    .spin-btn.mode-goout   { background: linear-gradient(135deg, var(--goout) 0%, var(--goout-dim) 100%);   box-shadow: 0 10px 40px rgba(52,211,153,0.3), 0 2px 0 rgba(255,255,255,0.08) inset; }
    .spin-btn.mode-goout:hover:not(:disabled) { box-shadow: 0 16px 48px rgba(52,211,153,0.5); }

    /* ── COMBO BADGE ── */
    .combo-badge {
      margin-top: 20px; text-align: center;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.5s, transform 0.5s;
    }
    .combo-badge.visible { opacity: 1; transform: translateY(0); }
    .combo-label { font-family: 'Bebas Neue', cursive; font-size: 11px; color: var(--accent); letter-spacing: 4px; margin-bottom: 5px; transition: color 0.4s; }
    .combo-text  { font-size: clamp(14px, 3.5vw, 19px); color: #fff; font-style: italic; }

    .loading-text { margin-top: 18px; text-align: center; color: var(--text-muted); font-style: italic; font-size: 14px; display: none; }
    .loading-text.visible { display: block; }
    .error-text   { margin-top: 16px; text-align: center; color: #ff5555; font-size: 14px; display: none; }
    .error-text.visible   { display: block; }

    /* ── RECIPE CARD ── */
    .result-card {
      margin-top: 26px;
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
      display: none;
    }
    .result-card.visible { display: block; }
    .result-card.shown   { opacity: 1; transform: translateY(0); }

    .result-inner {
      background: linear-gradient(135deg, #1c0900 0%, #120500 100%);
      border: 1px solid #3a1800;
      border-radius: 14px; padding: 24px;
      position: relative; overflow: hidden;
    }
    .result-inner::before {
      content: '';
      position: absolute; top: -60px; right: -60px;
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(255,107,53,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .result-title {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(19px, 4vw, 26px);
      color: var(--accent); letter-spacing: 2px;
      border-bottom: 1px solid #2a1000;
      padding-bottom: 10px; margin-bottom: 10px;
      transition: color 0.4s;
    }

    .result-desc { color: #c49070; font-style: italic; font-size: 14px; line-height: 1.65; margin-bottom: 20px; }

    .section-label { font-family: 'Bebas Neue', cursive; font-size: 12px; color: var(--accent); letter-spacing: 4px; margin-bottom: 8px; transition: color 0.4s; }

    .ingredient-item {
      display: flex; align-items: center; gap: 10px;
      padding: 4px 0; border-bottom: 1px solid rgba(58,24,0,0.5);
      color: var(--text-warm); font-size: 14px;
    }
    .ingredient-item::before { content: '◆'; color: var(--accent); font-size: 9px; flex-shrink: 0; transition: color 0.4s; }

    .ingredients { margin-bottom: 20px; }

    .step-item {
      display: flex; gap: 12px;
      padding: 7px 0; border-bottom: 1px solid rgba(58,24,0,0.3);
      color: var(--text-warm); font-size: 14px; line-height: 1.55;
    }
    .step-num { font-family: 'Bebas Neue', cursive; color: var(--accent); font-size: 17px; min-width: 20px; line-height: 1.2; transition: color 0.4s; }

    .pro-tip {
      margin-top: 16px;
      background: rgba(255,107,53,0.07); border: 1px solid rgba(255,107,53,0.18);
      border-radius: 10px; padding: 12px 16px;
      font-size: 14px; color: #c49070;
    }
    .pro-tip-label { font-family: 'Bebas Neue', cursive; font-size: 11px; color: var(--accent); letter-spacing: 3px; margin-right: 6px; transition: color 0.4s; }

    /* ── RESTAURANT CARD ── */
    .restaurant-meta {
      display: flex; flex-wrap: wrap; gap: 10px;
      margin-bottom: 18px; align-items: center;
    }
    .restaurant-rating {
      font-family: 'Bebas Neue', cursive; font-size: 22px; color: #fbbf24; letter-spacing: 1px;
    }
    .restaurant-reviews { color: var(--text-muted); font-size: 13px; }
    .restaurant-price   { font-family: 'Bebas Neue', cursive; font-size: 16px; color: var(--accent); transition: color 0.4s; }
    .restaurant-cats    { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
    .restaurant-cat-tag {
      font-size: 11px; font-family: 'Bebas Neue', cursive; letter-spacing: 1px;
      padding: 3px 8px; border-radius: 4px;
      background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid #2a1000;
    }

    .restaurant-address {
      color: var(--text-warm); font-size: 14px; font-style: italic;
      margin-bottom: 6px;
    }
    .restaurant-status {
      font-size: 13px; margin-bottom: 20px;
    }
    .status-open   { color: #34d399; }
    .status-closed { color: #f87171; }

    .cta-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 16px;
      border-radius: 10px; border: none;
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(16px, 3.5vw, 20px); letter-spacing: 3px;
      cursor: pointer; text-decoration: none; color: #fff;
      transition: all 0.3s;
    }
    .cta-btn.doordash {
      background: linear-gradient(135deg, var(--deliver) 0%, var(--deliver-dim) 100%);
      box-shadow: 0 8px 28px rgba(56,189,248,0.3);
    }
    .cta-btn.doordash:hover { transform: translateY(-2px); box-shadow: 0 14px 36px rgba(56,189,248,0.45); }
    .cta-btn.opentable {
      background: linear-gradient(135deg, var(--goout) 0%, var(--goout-dim) 100%);
      box-shadow: 0 8px 28px rgba(52,211,153,0.3);
    }
    .cta-btn.opentable:hover { transform: translateY(-2px); box-shadow: 0 14px 36px rgba(52,211,153,0.45); }

    .cta-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 12px 0; color: var(--text-dimmer); font-size: 12px; letter-spacing: 2px;
      font-family: 'Bebas Neue', cursive;
    }
    .cta-divider::before, .cta-divider::after {
      content: ''; flex: 1; height: 1px; background: #1a0800;
    }

    .cta-secondary {
      display: block; text-align: center;
      color: var(--text-muted); font-size: 13px; font-style: italic;
      text-decoration: none; padding: 8px;
      border-radius: 8px; transition: color 0.2s;
    }
    .cta-secondary:hover { color: var(--text-warm); }

    /* ── FOOTER ── */
    .footer {
      margin-top: 40px; font-family: 'Bebas Neue', cursive;
      font-size: 11px; letter-spacing: 4px; color: var(--text-dimmer); text-align: center;
    }

    /* ── ANIMATIONS ── */
    @keyframes flicker { 0%,100%{opacity:1} 48%{opacity:0.88} 50%{opacity:1} }
    @keyframes pulse-ring { 0%{transform:scale(1);opacity:0.7} 100%{transform:scale(1.06);opacity:0} }

    @media (min-width: 500px) {
      .reels { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>

<div class="page">
  <p class="eyebrow" id="eyebrow">Tonight's Challenge</p>
  <h1 class="headline">What's<br><span id="headlineAccent">Cooking</span></h1>
  <p class="tagline" id="tagline">Spin the wheel. Cook the card. Win dinner.</p>

  <!-- Mode Tabs -->
  <div class="mode-tabs">
    <button class="mode-tab active-cook" id="tab-cook"    onclick="setMode('cook')">🍳 Cook</button>
    <button class="mode-tab"             id="tab-deliver" onclick="setMode('deliver')">🛵 Delivery</button>
    <button class="mode-tab"             id="tab-goout"   onclick="setMode('goout')">🍽️ Go Out</button>
  </div>

  <!-- Main Card -->
  <div class="card" id="mainCard">

    <!-- Location bar (delivery + goout only) -->
    <div class="location-bar" id="locationBar" onclick="getLocation()">
      <div class="location-dot" id="locationDot"></div>
      <div class="location-text" id="locationText">Tap to detect your location</div>
      <div class="location-refresh">↻</div>
    </div>

    <!-- Reels -->
    <div class="reels" id="reels"></div>

    <!-- Spin Button -->
    <div class="spin-btn-wrap">
      <div class="pulse-ring" id="pulseRing"></div>
      <button class="spin-btn" id="spinBtn" onclick="spin()">SPIN THE WHEEL</button>
    </div>

    <!-- Combo Badge -->
    <div class="combo-badge" id="comboBadge">
      <div class="combo-label" id="comboLabel">Your Challenge</div>
      <div class="combo-text"  id="comboText"></div>
    </div>

    <!-- States -->
    <div class="loading-text" id="loadingText">The chef is thinking...</div>
    <div class="error-text"   id="errorText"></div>

    <!-- Result -->
    <div class="result-card" id="resultCard">
      <div class="result-inner" id="resultInner"></div>
    </div>
  </div>

  <p class="footer">Powered by the randomizer &nbsp;◆&nbsp; Every spin a new battle</p>
</div>

<script>
// ─────────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────────
const MODES = {
  cook: {
    eyebrow: "Tonight's Challenge",
    headline: "Cooking",
    tagline: "Spin the wheel. Cook the card. Win dinner.",
    label: "Your Challenge",
    btnText: "SPIN THE WHEEL",
    btnClass: "",
    accent: "#ff6b35",
    categories: {
      protein: { label: "Protein", icon: "🥩", items: ["Chicken","Salmon","Beef","Shrimp","Tofu","Pork","Lamb","Eggs","Tuna","Duck"] },
      produce:  { label: "Produce", icon: "🥦", items: ["Broccoli","Spinach","Sweet Potato","Zucchini","Mushrooms","Tomatoes","Bell Peppers","Cauliflower","Kale","Eggplant"] },
      style:    { label: "Style",   icon: "🌍", items: ["Italian","Japanese","Mexican","Indian","Thai","French","Korean","Mediterranean","American","Moroccan"] },
      time:     { label: "Time",    icon: "⏱️", items: ["15 min","30 min","45 min","1 hour","2 hours"] },
    },
  },
  deliver: {
    eyebrow: "Delivery Roulette",
    headline: "Deliver",
    tagline: "Spin your craving. We find the spot. You eat.",
    label: "Searching For",
    btnText: "FIND MY DELIVERY",
    btnClass: "mode-deliver",
    accent: "#38bdf8",
    categories: {
      cuisine: { label: "Cuisine",  icon: "🌍", items: ["Italian","Japanese","Mexican","Indian","Thai","French","Korean","Mediterranean","American","Chinese"] },
      price:   { label: "Budget",   icon: "💰", items: ["$","$$","$$$","$$$$"] },
      vibe:    { label: "Craving",  icon: "🔥", items: ["Comfort Food","Healthy","Indulgent","Quick & Easy","Adventurous","Light Bites"] },
      distance:{ label: "Distance", icon: "📍", items: ["Under 1 mi","Under 2 mi","Under 5 mi","Anywhere"] },
    },
  },
  goout: {
    eyebrow: "Table for Tonight",
    headline: "Go Out",
    tagline: "Spin your night. Real tables, real vibes.",
    label: "Looking For",
    btnText: "FIND MY TABLE",
    btnClass: "mode-goout",
    accent: "#34d399",
    categories: {
      cuisine:  { label: "Cuisine",    icon: "🌍", items: ["Italian","Japanese","Mexican","Indian","Thai","French","Korean","Mediterranean","American","Moroccan"] },
      vibe:     { label: "Atmosphere", icon: "✨", items: ["Casual","Romantic","Lively","Trendy","Rooftop","Hidden Gem","Classic"] },
      party:    { label: "Party Size", icon: "👥", items: ["Just Me","For 2","For 3-4","For 5+"] },
      timing:   { label: "When",       icon: "🕐", items: ["Right Now","Tonight","This Weekend","Next Week"] },
    },
  },
};

const YELP_CUISINE_MAP = {
  Italian: "italian", Japanese: "japanese", Mexican: "mexican",
  Indian: "indpak", Thai: "thai", French: "french",
  Korean: "korean", Mediterranean: "mediterranean", American: "newamerican",
  Moroccan: "moroccan", Chinese: "chinese", Greek: "greek",
};

const PRICE_MAP = { "$": 1, "$$": 2, "$$$": 3, "$$$$": 4 };
const DISTANCE_MAP = {
  "Under 1 mi": 1609, "Under 2 mi": 3218, "Under 5 mi": 8047, "Anywhere": 40000,
};

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let currentMode = "cook";
let isSpinning = false;
let isLoading  = false;
let phase      = "idle";
let userLat    = null;
let userLng    = null;
let userCity   = "your area";
let reelIntervals = {};
let reelIndexes   = {};

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
function init() { setMode("cook"); }

function setMode(mode) {
  currentMode = mode;
  const cfg = MODES[mode];

  // accent CSS var
  document.documentElement.style.setProperty("--accent", cfg.accent);

  // header copy
  document.getElementById("eyebrow").textContent       = cfg.eyebrow;
  document.getElementById("headlineAccent").textContent = cfg.headline;
  document.getElementById("tagline").textContent        = cfg.tagline;

  // tabs
  ["cook","deliver","goout"].forEach(m => {
    const t = document.getElementById(`tab-${m}`);
    t.className = `mode-tab${m === mode ? ` active-${m}` : ""}`;
  });

  // spin button
  const btn = document.getElementById("spinBtn");
  btn.className = `spin-btn ${cfg.btnClass}`;
  btn.textContent = cfg.btnText;

  // location bar
  const locBar = document.getElementById("locationBar");
  if (mode === "cook") {
    locBar.classList.remove("visible");
  } else {
    locBar.classList.add("visible");
    if (userLat) updateLocationDisplay();
    else document.getElementById("locationText").textContent = "Tap to detect your location";
  }

  // rebuild reels
  buildReels(cfg.categories);

  // clear result
  resetResult();
  phase = "idle";
}

function buildReels(categories) {
  const reelsEl = document.getElementById("reels");
  reelsEl.innerHTML = "";
  reelIntervals = {};
  reelIndexes   = {};

  Object.entries(categories).forEach(([key, cat]) => {
    reelIndexes[key] = 0;
    const wrap = document.createElement("div");
    wrap.className = "reel-wrap";
    wrap.innerHTML = `
      <div class="reel-label">${cat.icon} ${cat.label}</div>
      <div class="reel" id="reel-${key}">
        <div class="reel-fade-top"></div>
        <div class="reel-fade-bottom"></div>
        <div class="reel-text" id="reel-text-${key}">${cat.items[0]}</div>
      </div>
    `;
    reelsEl.appendChild(wrap);
  });
}

function resetResult() {
  document.getElementById("comboBadge").classList.remove("visible");
  document.getElementById("loadingText").classList.remove("visible");
  document.getElementById("errorText").classList.remove("visible");
  const rc = document.getElementById("resultCard");
  rc.classList.remove("visible","shown");
}

// ─────────────────────────────────────────────
//  LOCATION
// ─────────────────────────────────────────────
function getLocation() {
  document.getElementById("locationText").textContent = "Detecting location...";
  if (!navigator.geolocation) {
    document.getElementById("locationText").textContent = "Geolocation not supported";
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      reverseGeocode(userLat, userLng);
    },
    () => {
      document.getElementById("locationText").textContent = "Location access denied — using city search";
    }
  );
}

async function reverseGeocode(lat, lng) {
  try {
    const res  = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
    const data = await res.json();
    userCity   = data.address?.city || data.address?.town || data.address?.suburb || "your area";
    updateLocationDisplay();
  } catch {
    updateLocationDisplay();
  }
}

function updateLocationDisplay() {
  document.getElementById("locationText").textContent = `📍 ${userCity}`;
}

// ─────────────────────────────────────────────
//  SPIN
// ─────────────────────────────────────────────
async function spin() {
  if (isSpinning || isLoading) return;

  if (currentMode !== "cook" && !userLat) {
    await new Promise(resolve => {
      document.getElementById("locationText").textContent = "Detecting location...";
      navigator.geolocation.getCurrentPosition(
        async pos => {
          userLat = pos.coords.latitude;
          userLng = pos.coords.longitude;
          await reverseGeocode(userLat, userLng);
          resolve();
        },
        () => {
          showError("Location access needed for restaurant search. Please enable location and try again.");
          resolve();
        }
      );
    });
    if (!userLat) return;
  }

  isSpinning = true;
  phase      = "spinning";
  resetResult();

  const btn       = document.getElementById("spinBtn");
  const pulseRing = document.getElementById("pulseRing");
  btn.disabled    = true;
  btn.textContent = "SPINNING...";
  pulseRing.classList.add("active");

  const cfg       = MODES[currentMode];
  const catKeys   = Object.keys(cfg.categories);
  const finals    = {};
  catKeys.forEach(k => {
    finals[k] = Math.floor(Math.random() * cfg.categories[k].items.length);
  });

  // start spinning
  catKeys.forEach(k => {
    document.getElementById(`reel-${k}`).classList.add("spinning");
    reelIntervals[k] = setInterval(() => {
      reelIndexes[k] = (reelIndexes[k] + 1) % cfg.categories[k].items.length;
      document.getElementById(`reel-text-${k}`).textContent = cfg.categories[k].items[reelIndexes[k]];
    }, 80);
  });

  // staggered stop
  const stopDelays = [0, 300, 600, 900];
  await new Promise(r => setTimeout(r, 2200));

  for (let i = 0; i < catKeys.length; i++) {
    await new Promise(r => setTimeout(r, stopDelays[i]));
    const k = catKeys[i];
    clearInterval(reelIntervals[k]);
    document.getElementById(`reel-${k}`).classList.remove("spinning");
    reelIndexes[k] = finals[k];
    document.getElementById(`reel-text-${k}`).textContent = cfg.categories[k].items[finals[k]];
  }

  isSpinning = false;
  pulseRing.classList.remove("active");

  // build combo
  const combo = {};
  catKeys.forEach(k => { combo[k] = cfg.categories[k].items[finals[k]]; });

  showComboBadge(combo);

  btn.textContent = currentMode === "cook" ? "GENERATING RECIPE..." : "FINDING RESTAURANTS...";
  isLoading = true;
  document.getElementById("loadingText").classList.add("visible");

  try {
    if (currentMode === "cook")    await runCook(combo);
    if (currentMode === "deliver") await runDeliver(combo);
    if (currentMode === "goout")   await runGoOut(combo);
  } catch(e) {
    showError("Something went wrong. Give it another spin.");
  }

  isLoading = false;
  document.getElementById("loadingText").classList.remove("visible");
  btn.disabled    = false;
  btn.textContent = phase === "done" ? getSpinAgainLabel() : cfg.btnText;
  phase = "done";
}

function getSpinAgainLabel() {
  if (currentMode === "cook")    return "SPIN AGAIN";
  if (currentMode === "deliver") return "FIND ANOTHER";
  return "FIND ANOTHER TABLE";
}

function showComboBadge(combo) {
  const badge = document.getElementById("comboBadge");
  document.getElementById("comboLabel").textContent = MODES[currentMode].label;
  const values = Object.values(combo);
  let text = "";
  if (currentMode === "cook")    text = `${values[2]} ${values[0]} with ${values[1]} in ${values[3]}`;
  if (currentMode === "deliver") text = `${values[0]} · ${values[1]} · ${values[2]}`;
  if (currentMode === "goout")   text = `${values[0]} · ${values[1]} · ${values[2]}`;
  document.getElementById("comboText").textContent = text;
  badge.classList.add("visible");
}

function showError(msg) {
  const el = document.getElementById("errorText");
  el.textContent = msg;
  el.classList.add("visible");
}

// ─────────────────────────────────────────────
//  COOK MODE
// ─────────────────────────────────────────────
async function runCook(combo) {
  const prompt = `You are the personal chef of someone with serious culinary taste and discernment — think Anthony Bourdain's adventurousness, the precision of a Michelin-trained cook, and the creative ambition of someone who eats to experience the world, not just to feed themselves.

Generate a single recipe using ALL four constraints:
Protein: ${combo.protein}
Produce: ${combo.produce}
Style: ${combo.style}
Time: ${combo.time}

TASTE PROFILE OF THE COOK:
- Values bold, specific flavors over safe or generic ones
- Appreciates technique that is purposeful, not showy — every step should have a reason
- Seeks the unexpected within the familiar (a classic done with conviction, or a cross-cultural move that actually makes sense)
- Respects quality ingredients used simply over mediocre ingredients drowning in complexity
- Wants to learn something from every recipe — a technique, a flavor pairing, a cultural context
- Has no patience for watered-down, crowd-pleasing blandness
- Thinks long-term: cooks that build flavor, not shortcuts that fake it

RECIPE STANDARDS:
- Name the dish with specificity — not "Pan-Seared Chicken" but something that tells a story
- The description should make them feel something — one sentence, evocative, honest
- Ingredients: call out specific varieties, producers, or preparations where it matters (e.g. "Calabrian chili oil" not "chili oil", "good sherry vinegar" not "vinegar")
- Steps: write like you're in the kitchen together — direct, confident, sensory. Tell them what they should smell, hear, and see, not just what to do
- The pro tip should reveal something they didn't know — a technique insight, a flavor science moment, or a cultural note that reframes the dish
- Must be completable in ${combo.time} — no cheating on timing

Respond ONLY with valid JSON (no markdown, no backticks, no trailing commas):
{"title":"...","description":"...","ingredients":["..."],"steps":["..."],"tip":"..."}

8-10 ingredients. 5-7 steps. Elevated but achievable. Specific but not pretentious.`;

  const res  = await fetch("/api/recipe", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }],
    }),
  });

  const data  = await res.json();
  const text  = (data.content || []).map(c => c.text || "").join("");
  const clean = text.replace(/```json|```/g, "").trim();
  const r     = JSON.parse(clean);

  renderRecipe(r);
  showResult();
}

function renderRecipe(r) {
  document.getElementById("resultInner").innerHTML = `
    <div class="result-title">${r.title || ""}</div>
    ${r.description ? `<p class="result-desc">${r.description}</p>` : ""}
    ${r.ingredients?.length ? `
      <div class="ingredients">
        <div class="section-label">Ingredients</div>
        ${r.ingredients.map(i => `<div class="ingredient-item">${i}</div>`).join("")}
      </div>` : ""}
    ${r.steps?.length ? `
      <div>
        <div class="section-label">Method</div>
        ${r.steps.map((s,i) => `
          <div class="step-item">
            <div class="step-num">${i+1}</div>
            <div>${s}</div>
          </div>`).join("")}
      </div>` : ""}
    ${r.tip ? `
      <div class="pro-tip">
        <span class="pro-tip-label">PRO TIP:</span>${r.tip}
      </div>` : ""}
  `;
}

// ─────────────────────────────────────────────
//  DELIVER MODE
// ─────────────────────────────────────────────
async function runDeliver(combo) {
  const category = YELP_CUISINE_MAP[combo.cuisine] || "restaurants";
  const price    = PRICE_MAP[combo.price] || 2;
  const radius   = DISTANCE_MAP[combo.distance] || 8047;

  const params = new URLSearchParams({
    latitude: userLat, longitude: userLng,
    categories: category,
    price, radius,
    open_now: "true",
    limit: 10,
    sort_by: "rating",
  });

  const res  = await fetch(`/api/restaurants?${params}`);
  const data = await res.json();

  if (!data.businesses?.length) {
    showError(`No ${combo.cuisine} spots open nearby. Try different filters.`);
    return;
  }

  const pick = data.businesses[Math.floor(Math.random() * Math.min(data.businesses.length, 5))];
  renderRestaurant(pick, "deliver", combo);
  showResult();
}

// ─────────────────────────────────────────────
//  GO OUT MODE
// ─────────────────────────────────────────────
async function runGoOut(combo) {
  const category = YELP_CUISINE_MAP[combo.cuisine] || "restaurants";

  const vibeKeywords = {
    "Romantic":   "romantic", "Rooftop": "rooftop", "Trendy": "trendy",
    "Hidden Gem": "hidden gem", "Classic": "classic", "Lively": "bars",
    "Casual":     "casual",
  };

  const params = new URLSearchParams({
    latitude: userLat, longitude: userLng,
    categories: category,
    open_now: combo.timing === "Right Now" ? "true" : "false",
    limit: 10,
    sort_by: "rating",
    radius: 16000,
  });

  const res  = await fetch(`/api/restaurants?${params}`);
  const data = await res.json();

  if (!data.businesses?.length) {
    showError(`No ${combo.cuisine} restaurants found nearby. Try a different spin.`);
    return;
  }

  const pick = data.businesses[Math.floor(Math.random() * Math.min(data.businesses.length, 5))];
  renderRestaurant(pick, "goout", combo);
  showResult();
}

function renderRestaurant(biz, mode, combo) {
  const stars  = "★".repeat(Math.round(biz.rating || 0)) + "☆".repeat(5 - Math.round(biz.rating || 0));
  const price  = biz.price || "";
  const cats   = (biz.categories || []).map(c => c.title).join(" · ");
  const addr   = (biz.location?.display_address || []).join(", ");
  const name   = biz.name || "Restaurant";
  const isOpen = biz.hours?.[0]?.is_open_now;

  const ddQuery    = encodeURIComponent(name + " " + (biz.location?.city || ""));
  const ddLink     = `https://www.doordash.com/search/store/${encodeURIComponent(name)}/`;
  const otCovers   = combo.party === "Just Me" ? 1 : combo.party === "For 2" ? 2 : combo.party === "For 3-4" ? 4 : 6;
  const otLink     = `https://www.opentable.com/s/?term=${encodeURIComponent(name)}&covers=${otCovers}&metroId=4`;

  const isCook = false;

  document.getElementById("resultInner").innerHTML = `
    <div class="result-title">${name}</div>
    <div class="restaurant-meta">
      <div>
        <span class="restaurant-rating">${stars}</span>
        <span class="restaurant-reviews"> ${biz.rating || "?"} (${(biz.review_count || 0).toLocaleString()} reviews)</span>
      </div>
      ${price ? `<div class="restaurant-price">${price}</div>` : ""}
    </div>
    ${cats ? `<div class="restaurant-cats">${cats.split(" · ").map(c => `<span class="restaurant-cat-tag">${c}</span>`).join("")}</div>` : ""}
    <br>
    ${addr ? `<div class="restaurant-address">📍 ${addr}</div>` : ""}
    ${isOpen !== undefined ? `<div class="restaurant-status ${isOpen ? "status-open" : "status-closed"}">${isOpen ? "✓ Open now" : "✗ Currently closed"}</div>` : "<br>"}

    ${mode === "deliver" ? `
      <a class="cta-btn doordash" href="${ddLink}" target="_blank" rel="noopener">
        🛵 &nbsp; ORDER ON DOORDASH
      </a>
      <div class="cta-divider">or search manually</div>
      <a class="cta-secondary" href="https://www.doordash.com/search/store/${encodeURIComponent(combo.cuisine)}/" target="_blank" rel="noopener">
        Browse all ${combo.cuisine} delivery →
      </a>
    ` : `
      <a class="cta-btn opentable" href="${otLink}" target="_blank" rel="noopener">
        🍽️ &nbsp; RESERVE ON OPENTABLE
      </a>
      <div class="cta-divider">or search manually</div>
      <a class="cta-secondary" href="https://www.opentable.com/s/?term=${encodeURIComponent(combo.cuisine)}&covers=${otCovers}" target="_blank" rel="noopener">
        Browse all ${combo.cuisine} tables →
      </a>
    `}
  `;
}

function showResult() {
  const rc = document.getElementById("resultCard");
  rc.classList.add("visible");
  requestAnimationFrame(() => requestAnimationFrame(() => rc.classList.add("shown")));
}

init();
</script>
